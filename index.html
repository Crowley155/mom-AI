<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Every Part Matters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="music-bar">
    <button id="vo-toggle" class="music-bar-btn" title="Toggle voiceover narration">🔊</button>
    <input id="vo-slider" type="range" min="0" max="100" value="85" title="Narrator volume" />
    <span class="bar-divider">|</span>
    <span id="music-icon">♪</span>
    <input id="music-slider" type="range" min="0" max="100" value="30" title="Music volume" />
  </div>

  <div id="overlay">
    <!-- Intro screen -->
    <div id="intro-screen" class="screen active">
      <h1 class="title">Every Part Matters</h1>
      <p class="subtitle">How JCPRD's Gold Medal team keeps the district running — together</p>
      <button id="start-btn" class="btn-primary">Begin the Tour</button>
    </div>

    <!-- Tour HUD -->
    <div id="tour-hud" class="screen">
      <!-- caption-box is now position:fixed/draggable — kept inside overlay for show/hide -->
      <div id="caption-box">
        <span id="part-label" class="part-label"></span>
        <h2 id="team-name" class="team-name"></h2>
        <p id="team-desc" class="team-desc"></p>
      </div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <div id="tour-controls">
        <button id="back-btn" class="btn-icon" title="Previous">⏮</button>
        <button id="pause-btn" class="btn-icon" title="Pause">⏸</button>
        <span id="step-indicator">1 / 6</span>
        <button id="skip-btn" class="btn-icon" title="Next">⏭</button>
        <button id="autoplay-toggle" class="mode-pill active" title="Autoplay enabled">Autoplay</button>
        <div id="speed-bar">
          <button id="speed-half"   class="speed-pill"        title="Half speed">0.5×</button>
          <button id="speed-normal" class="speed-pill active"  title="Normal speed">1×</button>
          <button id="speed-double" class="speed-pill"         title="Double speed">2×</button>
        </div>
      </div>
    </div>

    <!-- Failure overlay -->
    <div id="failure-overlay" class="screen">
      <div id="failure-box">
        <p id="failure-text" class="failure-text"></p>
      </div>
    </div>

    <!-- Finale screen -->
    <div id="finale-screen" class="screen">
      <h1 class="finale-title">Every Part. Every Team.<br/>One Machine.</h1>
      <p class="finale-sub">Johnson County Park &amp; Recreation District — 2025 National Gold Medal Champions</p>
      <button id="replay-btn" class="btn-primary">Watch Again</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
